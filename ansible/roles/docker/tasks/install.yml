# installation manuelle : https://docs.docker.com/engine/install/ubuntu/
---
# tasks/install.yml
# Installation de Docker en suivant la méthode officielle (dépôt Docker).
# Les étapes sont idempotentes et taggées pour pouvoir n'installer que les dépendances si besoin.

- name: Installer dépendances APT de base
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: "{{ docker_update_cache | default(true) }}"
  tags:
    - docker
    - docker_install
    - docker_dependencies

- name: Créer /etc/apt/keyrings (pour Apt signed-by)
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  tags:
    - docker
    - docker_install

- name: Télécharger la clé GPG officielle de Docker
  get_url:
    url: "{{ docker_apt_gpg_url }}"
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  tags:
    - docker
    - docker_install

- name: Ajouter le dépôt Docker (sources list)
  copy:
    dest: /etc/apt/sources.list.d/docker.sources
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/ubuntu
      Suites: {{ ansible_distribution_release }}
      Components: stable
      Signed-By: /etc/apt/keyrings/docker.asc
    mode: '0644'
  tags:
    - docker
    - docker_install

- name: Mettre à jour le cache APT
  apt:
    update_cache: yes
  when: docker_update_cache | default(true)
  tags:
    - docker
    - docker_install

- name: Installer les paquets Docker
  apt:
    name: "{{ docker_packages }}"
    state: present
  notify: Restart docker
  tags:
    - docker
    - docker_install

- name: Activer et démarrer Docker
  systemd:
    name: "{{ docker_service_name }}"
    enabled: true
    state: started
  tags:
    - docker
    - docker_install

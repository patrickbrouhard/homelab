# installation manuelle : https://docs.docker.com/engine/install/ubuntu/
---
# tasks/install.yml
# Installation de Docker en suivant la méthode officielle (dépôt Docker).
# Les étapes sont idempotentes et taggées pour pouvoir n'installer que les dépendances si besoin.

- name: Installer dépendances APT de base
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
  tags:
    - docker
    - docker_install
    - docker_dependencies

- name: Créer /etc/apt/keyrings
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Télécharger la clé GPG Docker
  ansible.builtin.get_url:
    url: "{{ docker_apt_gpg_url }}"
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    checksum: "{{ docker_apt_gpg_checksum | default(omit) }}"

- name: Ajouter le dépôt Docker
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.sources
    content: |
      Types: deb
      URIs: {{ docker_apt_repo_url | default('https://download.docker.com/linux/ubuntu') }}
      Suites: {{ ansible_distribution_release }}
      Components: stable
      Signed-By: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Mettre à jour le cache APT
  ansible.builtin.apt:
    update_cache: yes

- name: Installer Docker
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
  notify: Restart docker

- name: Activer et démarrer Docker
  ansible.builtin.systemd:
    name: "{{ docker_service_name }}"
    enabled: true
    state: started
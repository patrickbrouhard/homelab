---
# Déploiement de la configuration daemon.json et application des paramètres sysctl.

- name: S’assurer que /etc/docker existe
  file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags:
    - docker
    - docker_config

- name: Écrire le fichier daemon.json à partir du template
  template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
  notify: Restart docker
  when:
    - docker_daemon_config is defined
    - docker_restart_on_config_change | default(true)
  tags:
    - docker
    - docker_config

- name: Écrire le fichier daemon.json (sans redémarrage)
  template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
  when:
    - docker_daemon_config is defined
    - not (docker_restart_on_config_change | default(true))
  tags:
    - docker
    - docker_config
    - docker_safe

- name: Appliquer les paramètres sysctl pour Docker
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: yes
    state: present
    reload: yes
  loop: "{{ docker_sysctl | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  tags:
    - docker
    - docker_config

---
# Déploiement de la configuration daemon.json et application des paramètres sysctl.

- name: S’assurer que /etc/docker existe
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags:
    - docker
    - docker_config

- name: Écrire le fichier daemon.json
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
  notify: "{{ 'Restart docker' if docker_restart_on_config_change | default(true) else omit }}"
  when: docker_daemon_config is defined

- name: Appliquer les paramètres sysctl pour Docker
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: yes
    state: present
    reload: yes
  loop: "{{ docker_sysctl | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  tags:
    - docker
    - docker_config

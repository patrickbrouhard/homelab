- name: S’assurer que la locale {{ system_locale }} existe
  locale_gen:
    name: "{{ system_locale }}"
    state: present
  tags:
    - baseline
    - locale

- name: Définir la locale système par défaut
  lineinfile:
    path: /etc/default/locale
    regexp: '^LANG='
    line: "LANG={{ system_locale }}"
  tags:
    - baseline
    - locale
# https://docs.ansible.com/projects/ansible/latest/collections/ansible/builtin/apt_module.html#ansible-collections-ansible-builtin-apt-module
---

- name: DEBUG use_dist_upgrade (effective value)
  ansible.builtin.debug:
    var: use_dist_upgrade
    verbosity: 2

- name: Update APT cache
  when: ansible_pkg_mgr == 'apt'
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  tags:
    - apt
    - update
    - maintenance

- name: Upgrade packages
  when: ansible_pkg_mgr == 'apt'
  ansible.builtin.apt:
    upgrade: "{{ 'dist' if use_dist_upgrade | default(false) else 'yes' }}"
  register: apt_result
  tags:
    - apt
    - upgrade
    - maintenance

- name: Log upgrade result
  ansible.builtin.debug:
    msg: >
      Upgrade {{ 'dist' if use_dist_upgrade | default(false) else 'standard' }}
      → changed={{ apt_result.changed | default(false) }}
  when: ansible_pkg_mgr == 'apt'
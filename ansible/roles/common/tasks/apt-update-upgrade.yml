# https://docs.ansible.com/projects/ansible/latest/collections/ansible/builtin/apt_module.html#ansible-collections-ansible-builtin-apt-module
---
- name: DEBUG use_dist_upgrade (effective value)
  debug:
    var: use_dist_upgrade

# Mise à jour du cache APT
- name: Update APT cache
  when: ansible_pkg_mgr == 'apt'
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  tags:
    - apt
    - update
    - maintenance

# Upgrade classique (apt upgrade)
- name: Upgrade packages (apt upgrade)
  when:
    - ansible_pkg_mgr == 'apt'
    - not use_dist_upgrade | default(false)
  ansible.builtin.apt:
    upgrade: yes
  register: apt_upgrade_result
  tags:
    - apt
    - upgrade
    - maintenance

# Dist-upgrade (apt-get dist-upgrade)
- name: Full upgrade (dist-upgrade)
  when:
    - ansible_pkg_mgr == 'apt'
    - use_dist_upgrade | default(false)
  ansible.builtin.apt:
    upgrade: dist
  register: apt_dist_upgrade_result
  tags:
    - apt
    - upgrade
    - maintenance

# Logging (optionnel)
- name: Log upgrade result
  ansible.builtin.debug:
    msg: |
      Upgrade type: {{
        'dist-upgrade' if use_dist_upgrade | default(false)
        else 'upgrade'
      }}
      Changed: {{
        (apt_dist_upgrade_result.changed
         if use_dist_upgrade | default(false)
         else apt_upgrade_result.changed)
      }}
      Packages updated:
      {% set pkgs = (
          apt_dist_upgrade_result.changes.packages
          if use_dist_upgrade | default(false)
          else apt_upgrade_result.changes.packages
        ) | default({}) %}
      {% if pkgs %}
      {% for name, version in pkgs.items() %}
        - {{ name }}: {{ version }}
      {% endfor %}
      {% else %}
        No packages were updated
      {% endif %}
  tags:
    - apt
    - maintenance
    - log

# Vérification si un reboot est nécessaire
- name: Check if reboot is required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required
  tags:
    - reboot
    - maintenance

# Redémarrage automatique conditionnel
- name: Reboot system if required
  when:
    - reboot_required.stat.exists
    - auto_reboot | default(true)
  ansible.builtin.reboot:
    msg: "Redémarrage déclenché par Ansible après mise à jour du système"
    reboot_timeout: 600
  tags:
    - reboot
    - maintenance
